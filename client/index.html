  <!-- Early performance class detection (before React loads) -->
  <script>
    (function(){
      var h=document.documentElement,n=navigator,c=n.connection||n.mozConnection||n.webkitConnection;
      var slow=c&&(c.saveData||c.effectiveType==='slow-2g'||c.effectiveType==='2g'||c.effectiveType==='3g');
      var lowEnd=(n.deviceMemory&&n.deviceMemory<=4)||(n.hardwareConcurrency&&n.hardwareConcurrency<=4);
      var rm=window.matchMedia&&window.matchMedia('(prefers-reduced-motion:reduce)').matches;
      var saved=false;try{saved=localStorage.getItem('tma-low-performance')==='true'}catch(e){}
      if(slow)h.classList.add('slow-network');
      if(saved||lowEnd||slow||rm){h.classList.add('low-performance');h.classList.add('reduce-motion')}
    })();
  </script>

  <!-- CRITICAL: Inline критический CSS (< 14KB) -->
  <style>
    /* Только стили для Above-the-Fold контента */
    :root {
      --emerald-500: #10B981;
      --bg: #000;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      background: var(--bg);
      color: #fff;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    
    /* Skeleton для первого экрана */
    .skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,0.08) 25%, rgba(255,255,255,0.15) 50%, rgba(255,255,255,0.08) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    
    /* Minimal loading indicator - matches Ultimate2026Loader */
    #root:empty::before {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      width: 48px;
      height: 48px;
      margin: -24px 0 0 -24px;
      border: 2px solid rgba(16, 185, 129, 0.3);
      border-radius: 50%;
      animation: pulse-ring 2s ease-in-out infinite;
    }
    
    #root:empty::after {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      width: 48px;
      height: 48px;
      margin: -24px 0 0 -24px;
      border: 2px solid transparent;
      border-top-color: #10B981;
      border-radius: 50%;
      animation: spin 1.5s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    @keyframes pulse-ring {
      0%, 100% { transform: scale(1); opacity: 0.3; }
      50% { transform: scale(1.1); opacity: 0.7; }
    }
    
    /* Full screen layout - CRITICAL for Telegram
       Use stable height from Telegram + lvh (large viewport) so layout
       does NOT reflow when the bot header collapses. */
    html, body {
      width: 100%;
      min-height: 100vh;
      min-height: 100lvh;
      min-height: var(--tg-viewport-stable-height, 100lvh);
      overflow-x: hidden;
      /* CRITICAL: Same background on html prevents different colored footer area */
      background: var(--bg);
    }

    #root {
      width: 100%;
      min-height: 100vh;
      min-height: 100lvh;
      min-height: var(--tg-viewport-stable-height, 100lvh);
    }

    /* TG boot mask — hide content until Telegram viewport settles to prevent
       the visible "header collapsing -> layout reflow" jump on first paint. */
    html.tg-booting #root { opacity: 0; }
    html.tg-ready   #root { opacity: 1; transition: opacity .22s ease-out; }
  </style>
  
  <!-- CRITICAL: Preconnect к Telegram SDK -->

  <script>
    if('scrollRestoration' in history) history.scrollRestoration='manual';
    window.scrollTo(0,0);
    var __htmlEl = document.documentElement;
    __htmlEl.classList.add('tg-booting');

    function __tgReady(){
      __htmlEl.classList.remove('tg-booting');
      __htmlEl.classList.add('tg-ready');
    }

    if(window.Telegram&&window.Telegram.WebApp){
      var tg=window.Telegram.WebApp;
      tg.ready();
      tg.expand();
      /* Immediately request fullscreen (Bot API 8.0+) so the bot header
         collapses BEFORE first paint - this is what kills the layout jump.
         Telegram leaves floating "X Закрыть / down-arrow / triple-dot"
         controls overlaid on our viewport in fullscreen mode and does NOT
         report their height via contentSafeAreaInset on most clients, so we
         set --csat=60px ourselves the moment we request fullscreen. */
      try{
        if(typeof tg.requestFullscreen==='function'){
          tg.requestFullscreen();
          __htmlEl.dataset.tgFullscreen='1';
          __htmlEl.style.setProperty('--csat','44px');
        }
      }catch(e){}
      try{
        if(typeof tg.setBottomBarColor==='function') tg.setBottomBarColor('#000000');
        if(typeof tg.setBackgroundColor==='function') tg.setBackgroundColor('#000000');
        if(typeof tg.setHeaderColor==='function') tg.setHeaderColor('#000000');
      }catch(e){}

      var __stableH = tg.viewportStableHeight || tg.viewportHeight || window.innerHeight;
      __htmlEl.style.setProperty('--tg-viewport-height', (tg.viewportHeight||window.innerHeight)+'px');
      __htmlEl.style.setProperty('--tg-viewport-stable-height', __stableH+'px');

      /* Re-trigger expand a couple of times - some clients ignore the first call */
      setTimeout(function(){ tg.expand(); }, 100);
      setTimeout(function(){ tg.expand(); window.scrollTo(0,0); }, 300);

      /* Reveal the app only after viewport settles to the stable (expanded) size,
         OR after a safety timeout - whichever comes first. */
      var __revealed = false;
      var __reveal = function(){
        if(__revealed) return;
        __revealed = true;
        __htmlEl.style.setProperty('--tg-viewport-stable-height', (tg.viewportStableHeight||tg.viewportHeight||window.innerHeight)+'px');
        requestAnimationFrame(__tgReady);
      };
      try{
        tg.onEvent('viewportChanged', function(e){
          var sh = tg.viewportStableHeight || tg.viewportHeight || window.innerHeight;
          __htmlEl.style.setProperty('--tg-viewport-height', (tg.viewportHeight||window.innerHeight)+'px');
          __htmlEl.style.setProperty('--tg-viewport-stable-height', sh+'px');
          /* isStateStable is true when the user finished the gesture / header settled */
          if(e && e.isStateStable===false) return;
          __reveal();
        });
      }catch(e){}
      /* Safety net - never keep content hidden longer than 700ms */
      setTimeout(__reveal, 700);
    } else {
      /* Not inside Telegram - reveal immediately */
      __tgReady();
    }
  </script>

  <script>
    if(window.Telegram&&window.Telegram.WebApp){
      var tg2=window.Telegram.WebApp;
      function setVH(){
        if(tg2.viewportHeight){
          document.documentElement.style.setProperty('--tg-viewport-height',tg2.viewportHeight+'px');
          document.documentElement.style.setProperty('--tg-viewport-width',window.innerWidth+'px');
        }
      }
      setVH();
      tg2.onEvent('viewportChanged',setVH);
    }
  </script>
