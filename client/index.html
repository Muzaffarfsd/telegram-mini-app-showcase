  <!-- CRITICAL: Inline критический CSS (< 14KB) -->
  <style>
    /* Только стили для Above-the-Fold контента */
    :root {
      --emerald-500: #10B981;
      --bg: #000;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      background: var(--bg);
      color: #fff;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    
    /* Skeleton для первого экрана */
    .skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,0.08) 25%, rgba(255,255,255,0.15) 50%, rgba(255,255,255,0.08) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    
    /* Minimal loading indicator - matches Ultimate2026Loader */
    #root:empty::before {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      width: 48px;
      height: 48px;
      margin: -24px 0 0 -24px;
      border: 2px solid rgba(16, 185, 129, 0.3);
      border-radius: 50%;
      animation: pulse-ring 2s ease-in-out infinite;
    }
    
    #root:empty::after {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      width: 48px;
      height: 48px;
      margin: -24px 0 0 -24px;
      border: 2px solid transparent;
      border-top-color: #10B981;
      border-radius: 50%;
      animation: spin 1.5s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    @keyframes pulse-ring {
      0%, 100% { transform: scale(1); opacity: 0.3; }
      50% { transform: scale(1.1); opacity: 0.7; }
    }
    
    /* Full screen layout - CRITICAL for Telegram */
    html, body {
      width: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
      /* CRITICAL: Same background on html prevents different colored footer area */
      background: var(--bg);
    }
    
    #root {
      width: 100%;
      min-height: 100vh;
      min-height: 100dvh;
    }
  </style>
  
  <!-- CRITICAL: Preconnect к Telegram SDK -->
  <link rel="preconnect" href="https://telegram.org" crossorigin>
  <link rel="dns-prefetch" href="https://telegram.org">
  
  <!-- CRITICAL: Vite injects modulepreload links automatically during build -->
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json">
  
  
  <!-- Telegram Web App SDK - загружаем с высоким приоритетом -->
  <script src="https://telegram.org/js/telegram-web-app.js" fetchpriority="high"></script>
  
  <script>
    if('scrollRestoration' in history) history.scrollRestoration='manual';
    window.scrollTo(0,0);
    if(window.Telegram&&window.Telegram.WebApp){
      var tg=window.Telegram.WebApp;
      tg.ready();
      tg.expand();
      try{
        if(typeof tg.setBottomBarColor==='function') tg.setBottomBarColor('#000000');
        if(typeof tg.setBackgroundColor==='function') tg.setBackgroundColor('#000000');
        if(typeof tg.setHeaderColor==='function') tg.setHeaderColor('#000000');
      }catch(e){}
      document.documentElement.style.setProperty('--tg-viewport-height',window.innerHeight+'px');
      setTimeout(function(){tg.expand()},100);
      setTimeout(function(){tg.expand();window.scrollTo(0,0)},300);
    }
  </script>
  
  <title>WEB4TG Studio - Telegram Mini Apps Portfolio</title>

<body>
  <!-- App Root with Static Shell for instant FCP -->
  <div id="root">
    <!-- STATIC SHELL: Показывается мгновенно пока React загружается -->
    <!-- React заменит этот контент после hydration -->
    <div id="static-shell" style="
      min-height: 100vh;
      min-height: 100dvh;
      background: #000;
      display: flex;
      flex-direction: column;
    ">
      <!-- Header skeleton -->
      <header style="
        padding: 16px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      ">
        <div class="skeleton" style="width: 100px; height: 24px; border-radius: 6px;"></div>
        <div class="skeleton" style="width: 36px; height: 36px; border-radius: 50%;"></div>
      </header>
      
      <!-- Hero skeleton -->
      <div style="padding: 40px 20px; text-align: center;">
        <div class="skeleton" style="
          width: 80%;
          max-width: 400px;
          height: 48px;
          margin: 0 auto 16px;
          border-radius: 8px;
        "></div>
        <div class="skeleton" style="
          width: 60%;
          max-width: 300px;
          height: 20px;
          margin: 0 auto;
          border-radius: 6px;
        "></div>
      </div>
      
      <!-- Cards skeleton grid -->
      <div style="
        padding: 20px;
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
      ">
        <div class="skeleton" style="height: 160px; border-radius: 12px;"></div>
        <div class="skeleton" style="height: 160px; border-radius: 12px;"></div>
        <div class="skeleton" style="height: 160px; border-radius: 12px;"></div>
        <div class="skeleton" style="height: 160px; border-radius: 12px;"></div>
      </div>
      
      <!-- Bottom nav skeleton -->
      <nav style="
        margin-top: auto;
        padding: 12px 20px 24px;
        display: flex;
        justify-content: space-around;
        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(20px);
      ">
        <div class="skeleton" style="width: 48px; height: 48px; border-radius: 12px;"></div>
        <div class="skeleton" style="width: 48px; height: 48px; border-radius: 12px;"></div>
        <div class="skeleton" style="width: 48px; height: 48px; border-radius: 12px;"></div>
        <div class="skeleton" style="width: 48px; height: 48px; border-radius: 12px;"></div>
      </nav>
    </div>
  </div>
  
  <script type="module" src="/src/main.tsx"></script>
  <script>
    if(window.Telegram&&window.Telegram.WebApp){
      var tg2=window.Telegram.WebApp;
      function setVH(){
        if(tg2.viewportHeight){
          document.documentElement.style.setProperty('--tg-viewport-height',tg2.viewportHeight+'px');
          document.documentElement.style.setProperty('--tg-viewport-width',window.innerWidth+'px');
        }
      }
      setVH();
      tg2.onEvent('viewportChanged',setVH);
    }
  </script>
